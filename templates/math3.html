<h1>次方與根號計算</h1>

<form method="post">
    x: <input type="text" name="x"><br><br>

    運算：
    <select name="opt">
        <option value="**">^次方</option>
        <option value="root">√根號</option>
    </select><br><br>

    y: <input type="text" name="y"><br><br>

    <input type="submit" value="計算">
</form>

{% if result %}
    <h2>結果：{{ result }}</h2>
{% endif %}
